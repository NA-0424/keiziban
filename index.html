HTML
<!-- ==========================================================================
   【移植パーツ】4桁暗証番号ログイン画面
   ========================================================================== -->
<div id="login-screen">
<div class="login-card">
<div class="login-header">
<div class="login-logo">UniTalk</div>
<p>サービスを利用するには4桁の暗証番号を入力してください</p>
</div>
<form id="login-form">
<div class="input-group">
<input type="password" id="login-pin" maxlength="4" placeholder="••••" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
</div>
<button type="submit" id="login-btn">
<span>認証する</span>
<i class="fas fa-arrow-right"></i>
</button>
<div id="login-error" class="error-message">暗証番号が正しくありません</div>
</form>
</div>
</div>
<style>
#login-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    z-index: 99999; /* 掲示板の全ての要素の上に重ねる */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px;
    box-sizing: border-box;
}
 
#login-screen .login-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 40px 30px;
    border-radius: 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
    text-align: center;
    animation: fadeInCard 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    box-sizing: border-box;
}
 
@keyframes fadeInCard {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
 
#login-screen .login-logo {
    font-size: 28px;
    font-weight: 800;
    color: #333333;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
}
 
#login-screen .login-header p {
    font-size: 13px;
    color: #666666;
    line-height: 1.5;
    margin: 0 0 32px 0;
}
 
#login-screen .input-group {
    position: relative;
    margin-bottom: 24px;
}
 
#login-screen #login-pin {
    width: 100%;
    box-sizing: border-box;
    padding: 16px 0;
    font-size: 24px;
    letter-spacing: 6px;
    text-indent: 6px;
    text-align: center;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    background-color: #ffffff;
    color: #333333;
    transition: all 0.3s ease;
    outline: none;
}
 
#login-screen #login-pin::placeholder {
    letter-spacing: 4px;
    text-indent: 4px;
    color: #cbd5e1;
}
 
#login-screen #login-pin:focus {
    border-color: #333333;
    box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05);
}
 
#login-screen #login-btn {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    background-color: #333333;
    color: #ffffff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    box-sizing: border-box;
}
 
#login-screen #login-btn:hover {
    background-color: #1a1a1a;
    transform: translateY(-1px);
}
 
#login-screen #login-btn:active {
    transform: translateY(1px);
}
 
#login-screen .error-message {
    color: #ef4444;
    font-size: 13px;
    margin-top: 12px;
    display: none;
}
 
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
}
</style>

<script>
// ==========================================================================
// JavaScriptロジック（暗証番号の判定と画面ロック解除）
// ==========================================================================
document.addEventListener("DOMContentLoaded", () => {
    const loginForm = document.getElementById("login-form");
    const loginScreen = document.getElementById("login-screen");
    const loginPin = document.getElementById("login-pin");
    const loginError = document.getElementById("login-error");
 
    if (loginForm) {
        loginForm.addEventListener("submit", (e) => {
            e.preventDefault(); // フォーム送信によるページリロードを確実に防止
 
            // 指定された4桁の暗証番号（前後の余計なスペースをトリムして比較）
            const inputVal = loginPin.value.trim();
            const correctPin = "2631";
 
            if (inputVal === correctPin) {
                // 正解の場合：エラーメッセージを隠す
                loginError.style.display = "none";
                // 滑らかにフェードアウトしてログイン画面を非表示にする
                loginScreen.style.transition = "opacity 0.4s ease, visibility 0.4s";
                loginScreen.style.opacity = "0";
                setTimeout(() => {
                    loginScreen.style.display = "none";
                }, 400);
                window.location.href = 'densi.html';
            } else {
                // 不正解の場合：エラーメッセージを出し、入力をリセット
                loginError.style.display = "block";
                loginPin.value = "";
                loginPin.focus();
 
                // 間違えた時にエラーメッセージをガタガタ揺らすアニメーション
                loginError.style.animation = 'none';
                loginError.offsetHeight; /* リフロー（再計算）を発生させてアニメーションをリセット */
                loginError.style.animation = 'shake 0.4s ease-in-out';
            }
        });
    }
});
</script>
